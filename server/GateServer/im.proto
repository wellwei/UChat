syntax = "proto3";
package im;

option cc_generic_services = false;

// ========== Common structures ==========
message Envelope {
  string msg_id = 1;        // 服务端生成，全局唯一
  string client_msg_id = 2; // 客户端生成，uuid 幂等性
  int64  from_uid = 3;
  int64  to_uid = 4;
  int64  group_id = 5;      // 0 非群聊
  int64  ts_ms = 6;         // 服务器时间戳，毫秒
  bytes  payload = 7;
  string trace_id = 8;      // 全局追踪观测
  uint64 seq_id = 9;        // 接收者视角的 inbox 序号，用于增量同步
}

enum AckType {
  ACK_UNKNOWN = 0;
  ACK_RECEIVED = 1;    // 网络层：客户端已收到消息
  ACK_DELIVERED = 2;   // 业务层：消息已送达用户设备
  ACK_READ = 3;        // 业务层：用户已读消息
}

// ====================
// 1. 数据通道：纯粹的双向流，只干三件事：连网、发消息、收推送
// ====================
service ChatTunnel {
  rpc Connect(stream ClientFrame) returns (stream ServerFrame);
}

message ClientFrame {
  // 保持精简 - 只保留核心数据流操作
  oneof body {
    LoginReq    login = 1;  // 鉴权重连
    Heartbeat   hb    = 2;  // 心跳
    SendReq     send  = 3;  // 发消息
    AckReq      ack   = 4;  // 底层 Ack 流控
  }
}

message ServerFrame {
  oneof body {
    LoginResp   login = 1;
    Pong        pong  = 2;
    PushMsg     push  = 3;  // 收到新消息推送
    SendResp    send  = 4;
    Kick        kick  = 5;
    Error       err   = 6;
  }
}

message LoginReq {
  int64 uid = 1;
  string token = 2;
  string device_id = 3;
}
message LoginResp {
  bool ok = 1;
  string reason = 2;
  int64 session_ver = 3;
}

message Heartbeat { int64 ts_ms = 1; }
message Pong { int64 ts_ms = 1; }

message SendReq { Envelope env = 1; }
message SendResp {
  bool ok = 1;
  string msg_id = 2;
  string reason = 3;
}

message AckReq {
  string msg_id = 1;
  AckType type = 2;
  int64 ts_ms = 3;
  uint64 max_inbox_seq = 4;
}

message PushMsg { Envelope env = 1; }

message Kick { string reason = 1; }
message Error { int32 code = 1; string message = 2; }

// ====================
// 2. 控制信令通道：全部使用标准的 Unary RPC
// 跟流互不干扰，不需要请求ID映射，客户端直接像调函数一样调用
// ====================
service ChatControlApi {
  // Sync 离线消息同步
  rpc Sync(SyncReq) returns (SyncResp);

  // Auth 认证操作（无需登录态）
  rpc GetVerifyCode(GetVerifyCodeReq) returns (GetVerifyCodeResp);
  rpc Register(RegisterReq) returns (RegisterResp);
  rpc AuthLogin(AuthLoginReq) returns (AuthLoginResp);
  rpc ResetPassword(ResetPasswordReq) returns (ResetPasswordResp);

  // User 用户资料（需要登录态）
  rpc GetUserProfile(GetUserProfileReq) returns (GetUserProfileResp);
  rpc UpdateUserProfile(UpdateUserProfileReq) returns (UpdateUserProfileResp);
  rpc SearchUser(SearchUserReq) returns (SearchUserResp);

  // Contact 联系人操作（需要登录态）
  rpc GetContacts(GetContactsReq) returns (GetContactsResp);
  rpc GetContactRequests(GetContactRequestsReq) returns (GetContactRequestsResp);
  rpc SendContactRequest(SendContactReqReq) returns (SendContactReqResp);
  rpc HandleContactRequest(HandleContactReqReq) returns (HandleContactReqResp);

  // Group 群聊操作（需要登录态）
  rpc CreateGroup(CreateGroupReq) returns (CreateGroupResp);
  rpc UpdateGroup(UpdateGroupReq) returns (UpdateGroupResp);
  rpc DeleteGroup(DeleteGroupReq) returns (DeleteGroupResp);
  rpc GetGroup(GetGroupReq) returns (GetGroupResp);
  rpc SearchGroups(SearchGroupsReq) returns (SearchGroupsResp);
  rpc ListMyGroups(ListMyGroupsReq) returns (ListMyGroupsResp);
  rpc JoinGroup(JoinGroupReq) returns (JoinGroupResp);
  rpc QuitGroup(QuitGroupReq) returns (QuitGroupResp);
  rpc GetGroupMembers(GetGroupMembersReq) returns (GetGroupMembersResp);
}

// ---------- Sync ----------
message SyncReq {
  uint64 last_inbox_seq = 1;
  uint32 limit = 2;
}
message SyncResp {
  bool ok = 1;
  string message = 2;
  repeated Envelope msgs = 3;
  uint64 max_inbox_seq = 4;
  bool has_more = 5;
}

// ---------- Auth ----------
message GetVerifyCodeReq  { string email = 1; }
message GetVerifyCodeResp { bool ok = 1; string message = 2; string email = 3; }

message RegisterReq {
  string email       = 1;
  string verify_code = 2;
  string username    = 3;
  string password    = 4;
}
message RegisterResp { bool ok = 1; string message = 2; int64 uid = 3; }

message AuthLoginReq  { string handle = 1; string password = 2; }
message AuthLoginResp { bool ok = 1; string message = 2; int64 uid = 3; string token = 4; }

message ResetPasswordReq  { string email = 1; string verify_code = 2; string new_password = 3; }
message ResetPasswordResp { bool ok = 1; string message = 2; }

// ---------- Profile ----------
message GetUserProfileReq {
  int64 target_uid = 1;  // 0 means self
}
message GetUserProfileResp {
  bool ok = 1;
  string message = 2;
  ProfileData profile = 3;
}

message UpdateUserProfileReq {
  string nickname = 1;
  string avatar_url = 2;
  string phone = 3;
  int32 gender = 4;
  string signature = 5;
  string location = 6;
}
message UpdateUserProfileResp {
  bool ok = 1;
  string message = 2;
  ProfileData profile = 3;
}

message SearchUserReq {
  string keyword = 1;
  int32 limit = 2;
}
message SearchUserResp {
  bool ok = 1;
  string message = 2;
  repeated ProfileData profiles = 3;
}

message ProfilePushNotify {
  int64 uid = 1;
  ProfileData profile = 2;
}

message ProfileData {
  int64 uid = 1;
  string username = 2;
  string nickname = 3;
  string avatar_url = 4;
  string email = 5;
  string phone = 6;
  int32 gender = 7;
  string signature = 8;
  string location = 9;
  int32 status = 10;
  string create_time = 11;
  string update_time = 12;
}

// ---------- Contact ----------
message GetContactsReq      {}
message GetContactRequestsReq {}

message SendContactReqReq   { int64 to_uid = 1; string note = 2; }
message HandleContactReqReq { int64 request_id = 1; bool accept = 2; }

message ContactEntryData   { int64 uid = 1; string username = 2; string nickname = 3; string avatar_url = 4; }
message ContactRequestData {
  int64 request_id = 1; int64 from_uid = 2; string from_username = 3;
  string from_avatar = 4; string note = 5; int64 ts_ms = 6;
}

message GetContactsResp        { bool ok = 1; string message = 2; repeated ContactEntryData contacts = 3; }
message GetContactRequestsResp { bool ok = 1; string message = 2; repeated ContactRequestData requests = 3; }
message SendContactReqResp     { bool ok = 1; string message = 2; }
message HandleContactReqResp   { bool ok = 1; string message = 2; }

message ContactReqNotify {
  int64 request_id = 1; int64 from_uid = 2; string from_username = 3;
  string from_avatar = 4; string note = 5; int64 ts_ms = 6;
}
message ContactAcceptNotify {
  int64 uid = 1; string username = 2; string nickname = 3; string avatar_url = 4;
}

// ---------- Group ----------
message GroupData {
  int64 group_id = 1;
  int64 owner_uid = 2;
  string name = 3;
  string avatar_url = 4;
  string notice = 5;
  string description = 6;
  uint32 member_count = 7;
  string create_time = 8;
  string update_time = 9;
}

message GroupMemberData {
  int64 uid = 1;
  string username = 2;
  string nickname = 3;
  string avatar_url = 4;
  int32 role = 5;
  string join_time = 6;
}

message CreateGroupReq {
  string name = 1;
  string avatar_url = 2;
  string notice = 3;
  string description = 4;
  repeated int64 member_uids = 5;
}
message CreateGroupResp {
  bool ok = 1;
  string message = 2;
  GroupData group = 3;
}

message UpdateGroupReq {
  int64 group_id = 1;
  string name = 2;
  string avatar_url = 3;
  string notice = 4;
  string description = 5;
}
message UpdateGroupResp {
  bool ok = 1;
  string message = 2;
  GroupData group = 3;
}

message DeleteGroupReq {
  int64 group_id = 1;
}
message DeleteGroupResp {
  bool ok = 1;
  string message = 2;
}

message GetGroupReq {
  int64 group_id = 1;
}
message GetGroupResp {
  bool ok = 1;
  string message = 2;
  GroupData group = 3;
}

message SearchGroupsReq {
  string keyword = 1;
  uint32 limit = 2;
}
message SearchGroupsResp {
  bool ok = 1;
  string message = 2;
  repeated GroupData groups = 3;
}

message ListMyGroupsReq {}
message ListMyGroupsResp {
  bool ok = 1;
  string message = 2;
  repeated GroupData groups = 3;
}

message JoinGroupReq {
  int64 group_id = 1;
}
message JoinGroupResp {
  bool ok = 1;
  string message = 2;
}

message QuitGroupReq {
  int64 group_id = 1;
}
message QuitGroupResp {
  bool ok = 1;
  string message = 2;
}

message GetGroupMembersReq {
  int64 group_id = 1;
}
message GetGroupMembersResp {
  bool ok = 1;
  string message = 2;
  repeated GroupMemberData members = 3;
}

// ====================
// 3. GateServer -> ChatServer: 内部 RPC
// ====================
service ChatApi {
  rpc SendMessage(SendMessageReq) returns (SendMessageResp);
  rpc Ack(AckUpReq) returns (AckUpResp);
  // Sync: pull missed messages based on client's MaxSeqID
  rpc Sync(SyncUpReq) returns (SyncUpResp);
}

message SendMessageReq {
  int64 from_uid = 1;
  int64 to_uid = 2;
  int64 group_id = 3;
  string client_msg_id = 4;
  bytes payload = 5;
  string trace_id = 6;
}
message SendMessageResp {
  bool ok = 1;
  string msg_id = 2;
  int64 ts_ms = 3;
  string reason = 4;
}

message AckUpReq {
  int64 uid = 1;
  string msg_id = 2;
  AckType type = 3;
  int64 ts_ms = 4;
  uint64 max_inbox_seq = 5;
}
message AckUpResp { bool ok = 1; }

message SyncUpReq {
  int64 uid = 1;
  uint64 last_inbox_seq = 2;
  uint32 limit = 3;
}
message SyncUpResp {
  bool ok = 1;
  repeated Envelope msgs = 2;
  uint64 max_inbox_seq = 3;
  bool has_more = 4;
}

// ====================
// 4. ChatServer -> GateServer: 投递 RPC
// ====================
service DeliverApi {
  rpc DeliverToUser(DeliverToUserReq) returns (DeliverToUserResp);
  rpc DeliverBatch(DeliverBatchReq) returns (DeliverBatchResp);
}

message DeliverToUserReq {
  int64 to_uid = 1;
  Envelope env = 2;
  int64 expected_session_ver = 3; // optional: 0 means no check
}
message DeliverToUserResp {
  bool ok = 1;
  bool online = 2;
  string reason = 3;
}

message DeliverBatchReq {
  repeated int64 to_uids = 1;
  Envelope env = 2;
}
message DeliverBatchResp {
  int32 delivered = 1;
  int32 offline = 2;
}
