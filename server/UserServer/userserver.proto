syntax = "proto3";


enum UserStatus {
    OFFLINE = 0;
    ONLINE = 1;
    BUSY = 2;
    AWAY = 3;
    INVISIBLE = 4;
    DND = 5;
}

enum UserGender {
    OTHER = 0;
    MALE = 1;
    FEMALE = 2;
}

message UserProfile {
    uint64 uid = 1;
    string username = 2;
    string nickname = 3;
    string avatar_url = 4;
    string email = 5;
    string phone = 6;
    UserGender gender = 7;
    string signature = 8;
    string location = 9;
    UserStatus status = 10;
    string create_time = 11;
    string update_time = 12;
}

message VerifyCredentialsRequest {
    string handle = 1;
    string password = 2;
}

message VerifyCredentialsResponse {
    bool success = 1;
    string error_msg = 2;
    uint64 uid = 3;
    UserProfile user_profile = 4;
    string token = 5;
}

message CreateUserRequest {
    string username = 1;
    string password = 2;
    string email = 3;
}

message CreateUserResponse {
    bool success = 1;
    uint32 code = 2;
    string error_msg = 3;
    uint64 uid = 4;
}

message GetUserProfileRequest {
    uint64 uid = 1;
}

message GetUserProfileResponse {
    bool success = 1;
    string error_msg = 2;
    UserProfile user_profile = 3;
}

message UpdateUserProfileRequest {
    uint64 uid = 1;
    UserProfile user_profile = 2;
}

message UpdateUserProfileResponse {
    bool success = 1;
    string error_msg = 2;
    UserProfile user_profile = 3;
}

message ResetPasswordRequest {
    string email = 1;
    string new_password = 2;
}

message ResetPasswordResponse {
    bool success = 1;
    string error_msg = 2;
}

// 查找用户请求
message SearchUserRequest {
    string keyword = 1;       // 搜索关键词 (用户名或邮箱)
}

// 查找用户响应
message SearchUserResponse {
    bool success = 1;
    string error_msg = 2;
    repeated UserProfile users = 3;   // 用户列表
}

// ===== M3: 联系人消息 =====
message SendContactRequestReq {
    uint64 from_uid = 1;
    uint64 to_uid   = 2;
    string note     = 3;
}
message SendContactRequestResp {
    bool   success    = 1;
    string error_msg  = 2;
    uint64 request_id = 3;
}

message HandleContactRequestReq {
    uint64 request_id  = 1;
    uint64 handler_uid = 2;
    bool   accept      = 3;
}
message HandleContactRequestResp {
    bool   success   = 1;
    string error_msg = 2;
    uint64 from_uid  = 3;
}

message GetContactsReq  { uint64 uid = 1; }
message ContactEntry    { uint64 uid = 1; string username = 2; string nickname = 3; string avatar_url = 4; }
message GetContactsResp { bool success = 1; string error_msg = 2; repeated ContactEntry contacts = 3; }

message GetContactRequestsReq { uint64 uid = 1; }
message ContactRequest {
    uint64 request_id    = 1;
    uint64 from_uid      = 2;
    string from_username = 3;
    string from_avatar   = 4;
    string note          = 5;
    int64  ts_ms         = 6;
}
message GetContactRequestsResp { bool success = 1; string error_msg = 2; repeated ContactRequest requests = 3; }

enum GroupMemberRole {
    GROUP_MEMBER = 0;
    GROUP_OWNER = 1;
}

message GroupInfo {
    uint64 group_id = 1;
    uint64 owner_uid = 2;
    string name = 3;
    string avatar_url = 4;
    string notice = 5;
    string description = 6;
    uint32 member_count = 7;
    string create_time = 8;
    string update_time = 9;
}

message GroupMemberInfo {
    uint64 uid = 1;
    string username = 2;
    string nickname = 3;
    string avatar_url = 4;
    GroupMemberRole role = 5;
    string join_time = 6;
}

message CreateGroupReq {
    uint64 owner_uid = 1;
    string name = 2;
    string avatar_url = 3;
    string notice = 4;
    string description = 5;
    repeated uint64 member_uids = 6;
}
message CreateGroupResp {
    bool success = 1;
    string error_msg = 2;
    GroupInfo group = 3;
}

message UpdateGroupReq {
    uint64 operator_uid = 1;
    uint64 group_id = 2;
    string name = 3;
    string avatar_url = 4;
    string notice = 5;
    string description = 6;
}
message UpdateGroupResp {
    bool success = 1;
    string error_msg = 2;
    GroupInfo group = 3;
}

message DeleteGroupReq {
    uint64 operator_uid = 1;
    uint64 group_id = 2;
}
message DeleteGroupResp {
    bool success = 1;
    string error_msg = 2;
}

message GetGroupReq {
    uint64 requester_uid = 1;
    uint64 group_id = 2;
}
message GetGroupResp {
    bool success = 1;
    string error_msg = 2;
    GroupInfo group = 3;
}

message SearchGroupsReq {
    string keyword = 1;
    uint32 limit = 2;
}
message SearchGroupsResp {
    bool success = 1;
    string error_msg = 2;
    repeated GroupInfo groups = 3;
}

message ListMyGroupsReq {
    uint64 uid = 1;
}
message ListMyGroupsResp {
    bool success = 1;
    string error_msg = 2;
    repeated GroupInfo groups = 3;
}

message JoinGroupReq {
    uint64 uid = 1;
    uint64 group_id = 2;
}
message JoinGroupResp {
    bool success = 1;
    string error_msg = 2;
}

message QuitGroupReq {
    uint64 uid = 1;
    uint64 group_id = 2;
}
message QuitGroupResp {
    bool success = 1;
    string error_msg = 2;
}

message GetGroupMembersReq {
    uint64 requester_uid = 1;
    uint64 group_id = 2;
}
message GetGroupMembersResp {
    bool success = 1;
    string error_msg = 2;
    repeated GroupMemberInfo members = 3;
}

// 用户服务
service UserService {
    // 验证用户凭证
    rpc VerifyCredentials(VerifyCredentialsRequest) returns (VerifyCredentialsResponse) {}

    // 创建用户
    rpc CreateUser(CreateUserRequest) returns (CreateUserResponse) {}

    // 获取用户资料
    rpc GetUserProfile(GetUserProfileRequest) returns (GetUserProfileResponse) {}

    // 更新用户资料
    rpc UpdateUserProfile(UpdateUserProfileRequest) returns (UpdateUserProfileResponse) {}

    // 重置密码
    rpc ResetPassword(ResetPasswordRequest) returns (ResetPasswordResponse) {}

    // 搜索用户
    rpc SearchUser(SearchUserRequest) returns (SearchUserResponse) {}

    // M3: 联系人操作
    rpc SendContactRequest(SendContactRequestReq)     returns (SendContactRequestResp)  {}
    rpc HandleContactRequest(HandleContactRequestReq) returns (HandleContactRequestResp){}
    rpc GetContacts(GetContactsReq)                   returns (GetContactsResp)         {}
    rpc GetContactRequests(GetContactRequestsReq)     returns (GetContactRequestsResp)  {}

    // M4: 群聊操作
    rpc CreateGroup(CreateGroupReq) returns (CreateGroupResp) {}
    rpc UpdateGroup(UpdateGroupReq) returns (UpdateGroupResp) {}
    rpc DeleteGroup(DeleteGroupReq) returns (DeleteGroupResp) {}
    rpc GetGroup(GetGroupReq) returns (GetGroupResp) {}
    rpc SearchGroups(SearchGroupsReq) returns (SearchGroupsResp) {}
    rpc ListMyGroups(ListMyGroupsReq) returns (ListMyGroupsResp) {}
    rpc JoinGroup(JoinGroupReq) returns (JoinGroupResp) {}
    rpc QuitGroup(QuitGroupReq) returns (QuitGroupResp) {}
    rpc GetGroupMembers(GetGroupMembersReq) returns (GetGroupMembersResp) {}
}
